<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetroX Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: #fff; padding: 20px; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; }
        button { background: #00d2ff; color: #000; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        button:active { transform: scale(0.98); }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; font-size: 14px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #333; }
        .btn-del { background: #ff3b30; color: #fff; padding: 5px 10px; width: auto; font-size: 12px; }
    </style>
</head>
<body>
    <div style="max-width: 600px; margin: auto;">
        <h2><i class="fas fa-user-shield"></i> NetroX Admin</h2>
        
        <input type="password" id="adminKey" placeholder="Enter Admin Key First">
        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">

        <div class="card">
            <h3>Add New Client</h3>
            <input type="text" id="u" placeholder="Username">
            <input type="text" id="p" placeholder="Password">
            <input type="text" id="n" placeholder="Full Name">
            <button onclick="api('add-client', {username:u.value, password:p.value, full_name:n.value})">CREATE CLIENT</button>
        </div>

        <div class="card">
            <h3>Link VPN to Client</h3>
            <input type="text" id="tu" placeholder="Client Username">
            <input type="text" id="vl" placeholder="Label (Dialog Zoom)">
            <input type="text" id="ve" placeholder="VPN Email ID">
            <textarea id="vc" placeholder="Config Link"></textarea>
            <button onclick="api('add-vpn', {username:tu.value, label:vl.value, vpn_email:ve.value, vpn_config:vc.value})">LINK VPN</button>
        </div>

        <div class="card">
            <button style="background:#333; color:#fff;" onclick="loadList()">REFRESH VPN LIST</button>
            <table id="list">
                <thead><tr><th>User</th><th>VPN Email</th><th>Action</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        const workerUrl = "https://adminpanel.kalpikachampathi.workers.dev"; // ඔබේ URL එක

        async function api(path, data) {
            const key = document.getElementById('adminKey').value;
            if(!key) return alert("Please enter Admin Key!");

            try {
                const res = await fetch(`${workerUrl}/admin/${path}`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': key
                    },
                    body: JSON.stringify(data)
                });
                if(res.ok) {
                    alert("Success!");
                    loadList();
                } else {
                    const err = await res.json();
                    alert("Error: " + (err.error || "Failed"));
                }
            } catch(e) {
                alert("Network Error: " + e.message);
            }
        }

        async function loadList() {
            const key = document.getElementById('adminKey').value;
            if(!key) return alert("Enter Admin Key to load list!");
            
            const res = await fetch(`${workerUrl}/admin/list`, {
                headers: { 'Authorization': key }
            });
            if(res.ok) {
                const data = await res.json();
                const tbody = document.querySelector("#list tbody");
                tbody.innerHTML = "";
                data.vpns.forEach(v => {
                    tbody.innerHTML += `<tr><td>${v.username}</td><td>${v.vpn_email}</td><td><button class="btn-del" onclick="api('delete-vpn', {id:${v.id}})">DEL</button></td></tr>`;
                });
            } else {
                alert("Could not load list. Check Key.");
            }
        }
    </script>
</body>
</html>
